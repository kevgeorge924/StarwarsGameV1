<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>X-Wing Death Star Run - Phase 2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      #app {
        width: 100%;
        height: 100%;
      }

      .overlay {
        position: fixed;
        top: 12px;
        left: 12px;
        padding: 6px 10px;
        background: rgba(0, 0, 0, 0.6);
        color: #f8fafc;
        font-size: 12px;
        border-radius: 4px;
        border: 1px solid rgba(148, 163, 184, 0.6);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="overlay">
      Phase 2: A/D roll · ←/→ left/right · ↑/↓ up/down · W/S pitch
    </div>

    <!-- Three.js from CDN -->
    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.165.0/build/three.module.js";

      const app = document.getElementById("app");

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      const camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 1.5, 7);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio || 1);
      app.appendChild(renderer.domElement);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);

      const keyLight = new THREE.DirectionalLight(0xffffff, 1.0);
      keyLight.position.set(6, 10, 10);
      scene.add(keyLight);

      // --- X-Wing inspired ship (very low-poly, uses simple primitives) ---

      const ship = new THREE.Group();

      // Fuselage (rocket-like, pointy nose + rear body)
      const noseGeometry = new THREE.CylinderGeometry(0.0, 0.45, 2.2, 16);
      const midGeometry = new THREE.CylinderGeometry(0.45, 0.45, 1.4, 16);
      const rearGeometry = new THREE.BoxGeometry(0.9, 0.55, 2.0);

      const hullMaterialDark = new THREE.MeshStandardMaterial({
        color: 0x1f2933,
        metalness: 0.4,
        roughness: 0.6,
      });

      const nose = new THREE.Mesh(noseGeometry, hullMaterialDark);
      nose.rotation.x = Math.PI / 2;
      nose.position.set(0, 0.15, 2.4);

      const mid = new THREE.Mesh(midGeometry, hullMaterialDark);
      mid.rotation.x = Math.PI / 2;
      mid.position.set(0, 0.16, 1.2);

      const rear = new THREE.Mesh(rearGeometry, hullMaterialDark);
      rear.position.set(0, 0.18, -0.5);

      ship.add(nose);
      ship.add(mid);
      ship.add(rear);

      // Cockpit canopy
      const cockpitGeometry = new THREE.BoxGeometry(0.5, 0.4, 0.9);
      const cockpitMaterial = new THREE.MeshStandardMaterial({
        color: 0x9ca3af,
        metalness: 0.8,
        roughness: 0.2,
      });
      const cockpit = new THREE.Mesh(cockpitGeometry, cockpitMaterial);
      cockpit.position.set(0, 0.55, 0.4);
      cockpit.rotation.x = -0.12;
      ship.add(cockpit);

      // Astromech droid dome
      const droidGeometry = new THREE.SphereGeometry(0.18, 16, 16, 0, Math.PI * 2, 0, Math.PI / 2);
      const droidMaterial = new THREE.MeshStandardMaterial({
        color: 0xe5e7eb,
        metalness: 0.7,
        roughness: 0.2,
      });
      const droid = new THREE.Mesh(droidGeometry, droidMaterial);
      droid.position.set(0, 0.52, -0.3);
      ship.add(droid);

      // Wing material colors (dark frame + orange panels)
      const wingFrameMaterial = new THREE.MeshStandardMaterial({
        color: 0x111827,
        metalness: 0.4,
        roughness: 0.7,
      });

      const wingPanelMaterial = new THREE.MeshStandardMaterial({
        color: 0xf97316, // orange
        metalness: 0.5,
        roughness: 0.5,
        emissive: 0x1f1305,
        emissiveIntensity: 0.4,
      });

      // Build wings explicitly so that on each SIDE:
      // - one wing is swept slightly forward
      // - the other wing is swept slightly backward
      // Wings open/close based on ship roll (stored for per-frame updates)
      const wingRefs = [];
      function addSideWings(side) {
        const span = 2.5 * side; // left: -2.5, right: 2.5
        const wingLength = 3.4;
        const wingWidth = 0.3;
        const wingThickness = 0.08;

        const wingGeom = new THREE.BoxGeometry(wingLength, wingThickness, wingWidth);
        const panelGeom = new THREE.BoxGeometry(1.6, wingThickness * 1.2, wingWidth * 0.9);

        const zForward = 0.9;
        const zBackward = -0.9;
        const yOffset = 0.48;

        const upperWing = new THREE.Mesh(wingGeom, wingFrameMaterial);
        const upperPanel = new THREE.Mesh(panelGeom, wingPanelMaterial);
        const upperZ = side === -1 ? zForward : zBackward;
        upperWing.position.set(span, yOffset, upperZ);
        upperPanel.position.copy(upperWing.position);
        upperPanel.position.x += 0.18;
        const upperBaseAngle = side === -1 ? -0.32 : 0.32;
        wingRefs.push({ mesh: upperWing, panel: upperPanel, baseAngle: upperBaseAngle });

        const lowerWing = new THREE.Mesh(wingGeom, wingFrameMaterial);
        const lowerPanel = new THREE.Mesh(panelGeom, wingPanelMaterial);
        const lowerZ = side === -1 ? zBackward : zForward;
        lowerWing.position.set(span, -yOffset, lowerZ);
        lowerPanel.position.copy(lowerWing.position);
        lowerPanel.position.x += 0.18;
        const lowerBaseAngle = side === -1 ? 0.32 : -0.32;
        wingRefs.push({ mesh: lowerWing, panel: lowerPanel, baseAngle: lowerBaseAngle });

        ship.add(upperWing, upperPanel, lowerWing, lowerPanel);
      }

      addSideWings(-1);
      addSideWings(1);

      // Engines (cylinders on each wing root)
      const engineGeometry = new THREE.CylinderGeometry(0.24, 0.24, 0.9, 16);
      const engineMaterial = new THREE.MeshStandardMaterial({
        color: 0x4b5563,
        metalness: 0.7,
        roughness: 0.3,
      });

      function addEngine(x, y, z) {
        const engine = new THREE.Mesh(engineGeometry, engineMaterial);
        engine.rotation.z = Math.PI / 2;
        engine.position.set(x, y, z);
        ship.add(engine);
      }

      const engineZ = -0.15;
      const engineY = 0.0;
      const engineXOffset = 1.35;
      addEngine(engineXOffset, engineY + 0.35, engineZ);
      addEngine(-engineXOffset, engineY + 0.35, engineZ);
      addEngine(engineXOffset, engineY - 0.35, engineZ);
      addEngine(-engineXOffset, engineY - 0.35, engineZ);

      // Laser cannons at wing tips
      const cannonBarrelGeometry = new THREE.CylinderGeometry(0.04, 0.04, 0.9, 12);
      const cannonTipGeometry = new THREE.SphereGeometry(0.08, 12, 12);
      const cannonMaterial = new THREE.MeshStandardMaterial({
        color: 0xe5e7eb,
        metalness: 0.8,
        roughness: 0.3,
      });

      function addCannon(x, y, z) {
        const cannon = new THREE.Group();
        const barrel = new THREE.Mesh(cannonBarrelGeometry, cannonMaterial);
        barrel.rotation.x = Math.PI / 2;
        barrel.position.set(0, 0.45, 0);

        const tip = new THREE.Mesh(cannonTipGeometry, cannonMaterial);
        tip.position.set(0, 0.95, 0);

        cannon.add(barrel);
        cannon.add(tip);
        cannon.position.set(x, y, z);
        ship.add(cannon);
      }

      const cannonZ = 1.4;
      const cannonYOffset = 0.45;
      const cannonXOffset = 3.1;

      addCannon(cannonXOffset, cannonYOffset, cannonZ);
      addCannon(cannonXOffset, -cannonYOffset, cannonZ);
      addCannon(-cannonXOffset, cannonYOffset, cannonZ);
      addCannon(-cannonXOffset, -cannonYOffset, cannonZ);

      ship.position.set(0, 0.2, 0);
      ship.rotation.y = Math.PI; // face into screen (forward = -Z)
      scene.add(ship);

      // --- Phase 2: Input & movement ---
      const keys = {
        rollLeft: false, rollRight: false,
        moveLeft: false, moveRight: false, moveUp: false, moveDown: false,
        pitchUp: false, pitchDown: false
      };
      const rollRate = 1.2;
      const moveSpeed = 14;
      const pitchRate = 0.8;
      const forwardSpeed = 12;
      // Screen bounds: ship stays within view (world units)
      const BOUNDS_X = 14;
      const BOUNDS_Y = 8;

      function onKeyDown(e) {
        if (["KeyA","KeyD","KeyW","KeyS","ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.code)) e.preventDefault();
        switch (e.code) {
          case "KeyA": keys.rollLeft = true; break;
          case "KeyD": keys.rollRight = true; break;
          case "ArrowLeft": keys.moveLeft = true; break;
          case "ArrowRight": keys.moveRight = true; break;
          case "ArrowUp": keys.moveUp = true; break;
          case "ArrowDown": keys.moveDown = true; break;
          case "KeyW": keys.pitchUp = true; break;
          case "KeyS": keys.pitchDown = true; break;
        }
      }
      function onKeyUp(e) {
        switch (e.code) {
          case "KeyA": keys.rollLeft = false; break;
          case "KeyD": keys.rollRight = false; break;
          case "ArrowLeft": keys.moveLeft = false; break;
          case "ArrowRight": keys.moveRight = false; break;
          case "ArrowUp": keys.moveUp = false; break;
          case "ArrowDown": keys.moveDown = false; break;
          case "KeyW": keys.pitchUp = false; break;
          case "KeyS": keys.pitchDown = false; break;
        }
      }
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);

      const forward = new THREE.Vector3(0, 0, 1);
      const right = new THREE.Vector3(1, 0, 0);
      const cameraTarget = new THREE.Vector3();
      const lookTarget = new THREE.Vector3();
      const cameraSmooth = 0.08;
      const cameraDistance = 8;
      const cameraHeight = 2;

      const starGeometry = new THREE.BufferGeometry();
      const starCount = 1200;
      const starPositions = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount; i++) {
        const i3 = i * 3;
        starPositions[i3 + 0] = (Math.random() - 0.5) * 120;
        starPositions[i3 + 1] = (Math.random() - 0.5) * 120;
        starPositions[i3 + 2] = (Math.random() - 0.5) * 400 - 100;
      }
      starGeometry.setAttribute(
        "position",
        new THREE.BufferAttribute(starPositions, 3)
      );
      const starMaterial = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.05,
      });
      const stars = new THREE.Points(starGeometry, starMaterial);
      scene.add(stars);

      function onResize() {
        const width = window.innerWidth;
        const height = window.innerHeight;
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height);
      }

      window.addEventListener("resize", onResize);

      let lastTime = performance.now();
      function animate() {
        requestAnimationFrame(animate);
        const now = performance.now();
        const dt = Math.min((now - lastTime) / 1000, 0.1);
        lastTime = now;

        // Apply input to ship rotation (roll, pitch)
        if (keys.rollLeft) ship.rotation.z += rollRate * dt;
        if (keys.rollRight) ship.rotation.z -= rollRate * dt;
        if (keys.pitchUp) ship.rotation.x -= pitchRate * dt;
        if (keys.pitchDown) ship.rotation.x += pitchRate * dt;

        // Move ship forward along its nose direction
        forward.set(0, 0, 1);
        forward.applyQuaternion(ship.quaternion);
        ship.position.addScaledVector(forward, forwardSpeed * dt);

        // Move left/right and up/down on screen (arrow keys), clamped to bounds
        if (keys.moveLeft) ship.position.x -= moveSpeed * dt;
        if (keys.moveRight) ship.position.x += moveSpeed * dt;
        if (keys.moveDown) ship.position.y -= moveSpeed * dt;
        if (keys.moveUp) ship.position.y += moveSpeed * dt;
        ship.position.x = Math.max(-BOUNDS_X, Math.min(BOUNDS_X, ship.position.x));
        ship.position.y = Math.max(-BOUNDS_Y, Math.min(BOUNDS_Y, ship.position.y));

        // Stars move opposite to ship for "flying through space" feel
        stars.position.addScaledVector(forward, -forwardSpeed * dt);
        if (keys.moveLeft) stars.position.x += moveSpeed * dt;
        if (keys.moveRight) stars.position.x -= moveSpeed * dt;
        if (keys.moveUp) stars.position.y -= moveSpeed * dt;
        if (keys.moveDown) stars.position.y += moveSpeed * dt;

        // Wings open/close based on roll: closed when level, open when banking
        const roll = ship.rotation.z;
        const spread = Math.min(1, Math.abs(roll) * 2.2);
        const wingAngle = 0.08 + spread * 0.5;
        wingRefs.forEach(({ mesh, panel, baseAngle }) => {
          const sign = baseAngle >= 0 ? 1 : -1;
          mesh.rotation.z = sign * wingAngle;
          panel.rotation.x = mesh.rotation.x;
          panel.rotation.y = mesh.rotation.y;
          panel.rotation.z = mesh.rotation.z;
        });

        // Camera: behind and above ship, smooth follow
        forward.set(0, 0, 1);
        forward.applyQuaternion(ship.quaternion);
        cameraTarget.copy(ship.position).addScaledVector(forward, -cameraDistance).add(new THREE.Vector3(0, cameraHeight, 0));
        camera.position.lerp(cameraTarget, cameraSmooth);
        lookTarget.copy(ship.position).addScaledVector(forward, 3);
        camera.lookAt(lookTarget);

        renderer.render(scene, camera);
      }

      animate();
    </script>
  </body>
</html>
