<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>X-Wing Death Star Run - Phase 1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      #app {
        width: 100%;
        height: 100%;
      }

      .overlay {
        position: fixed;
        top: 12px;
        left: 12px;
        padding: 6px 10px;
        background: rgba(0, 0, 0, 0.6);
        color: #f8fafc;
        font-size: 12px;
        border-radius: 4px;
        border: 1px solid rgba(148, 163, 184, 0.6);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="overlay">
      Phase 1: Static X-Wing display (no controls yet)
    </div>

    <!-- Three.js from CDN -->
    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.165.0/build/three.module.js";

      const app = document.getElementById("app");

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      const camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 1.5, 7);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio || 1);
      app.appendChild(renderer.domElement);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);

      const keyLight = new THREE.DirectionalLight(0xffffff, 1.0);
      keyLight.position.set(6, 10, 10);
      scene.add(keyLight);

      // --- X-Wing inspired ship (very low-poly, uses simple primitives) ---

      const ship = new THREE.Group();

      // Fuselage (rocket-like, pointy nose + rear body)
      const noseGeometry = new THREE.CylinderGeometry(0.0, 0.45, 2.2, 16);
      const midGeometry = new THREE.CylinderGeometry(0.45, 0.45, 1.4, 16);
      const rearGeometry = new THREE.BoxGeometry(0.9, 0.55, 2.0);

      const hullMaterialDark = new THREE.MeshStandardMaterial({
        color: 0x1f2933,
        metalness: 0.4,
        roughness: 0.6,
      });

      const nose = new THREE.Mesh(noseGeometry, hullMaterialDark);
      nose.rotation.x = Math.PI / 2;
      nose.position.set(0, 0.15, 2.4);

      const mid = new THREE.Mesh(midGeometry, hullMaterialDark);
      mid.rotation.x = Math.PI / 2;
      mid.position.set(0, 0.16, 1.2);

      const rear = new THREE.Mesh(rearGeometry, hullMaterialDark);
      rear.position.set(0, 0.18, -0.5);

      ship.add(nose);
      ship.add(mid);
      ship.add(rear);

      // Cockpit canopy
      const cockpitGeometry = new THREE.BoxGeometry(0.5, 0.4, 0.9);
      const cockpitMaterial = new THREE.MeshStandardMaterial({
        color: 0x9ca3af,
        metalness: 0.8,
        roughness: 0.2,
      });
      const cockpit = new THREE.Mesh(cockpitGeometry, cockpitMaterial);
      cockpit.position.set(0, 0.55, 0.4);
      cockpit.rotation.x = -0.12;
      ship.add(cockpit);

      // Astromech droid dome
      const droidGeometry = new THREE.SphereGeometry(0.18, 16, 16, 0, Math.PI * 2, 0, Math.PI / 2);
      const droidMaterial = new THREE.MeshStandardMaterial({
        color: 0xe5e7eb,
        metalness: 0.7,
        roughness: 0.2,
      });
      const droid = new THREE.Mesh(droidGeometry, droidMaterial);
      droid.position.set(0, 0.52, -0.3);
      ship.add(droid);

      // Wing material colors (dark frame + orange panels)
      const wingFrameMaterial = new THREE.MeshStandardMaterial({
        color: 0x111827,
        metalness: 0.4,
        roughness: 0.7,
      });

      const wingPanelMaterial = new THREE.MeshStandardMaterial({
        color: 0xf97316, // orange
        metalness: 0.5,
        roughness: 0.5,
        emissive: 0x1f1305,
        emissiveIntensity: 0.4,
      });

      // Build wings explicitly so that on each SIDE:
      // - one wing is swept slightly forward
      // - the other wing is swept slightly backward
      // This makes it very obvious that the wings on each side
      // point in opposite directions along the ship.
      function addSideWings(side) {
        const span = 2.5 * side; // left: -2.5, right: 2.5
        const wingLength = 3.4;
        const wingWidth = 0.3;
        const wingThickness = 0.08;

        const wingGeom = new THREE.BoxGeometry(wingLength, wingThickness, wingWidth);
        const panelGeom = new THREE.BoxGeometry(1.6, wingThickness * 1.2, wingWidth * 0.9);

        // Z positions for obvious "forward" and "backward" sweep
        const zForward = 0.9;
        const zBackward = -0.9;
        const yOffset = 0.48;

        // Upper wing (swept forward on left, backward on right)
        const upperWing = new THREE.Mesh(wingGeom, wingFrameMaterial);
        const upperPanel = new THREE.Mesh(panelGeom, wingPanelMaterial);

        const upperZ = side === -1 ? zForward : zBackward;
        upperWing.position.set(span, yOffset, upperZ);
        upperPanel.position.copy(upperWing.position);
        upperPanel.position.x += 0.18;

        upperWing.rotation.z = side === -1 ? -0.32 : 0.32;
        upperPanel.rotation.copy(upperWing.rotation);

        // Lower wing (swept backward on left, forward on right)
        const lowerWing = new THREE.Mesh(wingGeom, wingFrameMaterial);
        const lowerPanel = new THREE.Mesh(panelGeom, wingPanelMaterial);

        const lowerZ = side === -1 ? zBackward : zForward;
        lowerWing.position.set(span, -yOffset, lowerZ);
        lowerPanel.position.copy(lowerWing.position);
        lowerPanel.position.x += 0.18;

        lowerWing.rotation.z = side === -1 ? 0.32 : -0.32;
        lowerPanel.rotation.copy(lowerWing.rotation);

        ship.add(upperWing, upperPanel, lowerWing, lowerPanel);
      }

      // Left side (side = -1) and right side (side = +1)
      addSideWings(-1);
      addSideWings(1);

      // Engines (cylinders on each wing root)
      const engineGeometry = new THREE.CylinderGeometry(0.24, 0.24, 0.9, 16);
      const engineMaterial = new THREE.MeshStandardMaterial({
        color: 0x4b5563,
        metalness: 0.7,
        roughness: 0.3,
      });

      function addEngine(x, y, z) {
        const engine = new THREE.Mesh(engineGeometry, engineMaterial);
        engine.rotation.z = Math.PI / 2;
        engine.position.set(x, y, z);
        ship.add(engine);
      }

      const engineZ = -0.15;
      const engineY = 0.0;
      const engineXOffset = 1.35;
      addEngine(engineXOffset, engineY + 0.35, engineZ);
      addEngine(-engineXOffset, engineY + 0.35, engineZ);
      addEngine(engineXOffset, engineY - 0.35, engineZ);
      addEngine(-engineXOffset, engineY - 0.35, engineZ);

      // Laser cannons at wing tips
      const cannonBarrelGeometry = new THREE.CylinderGeometry(0.04, 0.04, 0.9, 12);
      const cannonTipGeometry = new THREE.SphereGeometry(0.08, 12, 12);
      const cannonMaterial = new THREE.MeshStandardMaterial({
        color: 0xe5e7eb,
        metalness: 0.8,
        roughness: 0.3,
      });

      function addCannon(x, y, z) {
        const cannon = new THREE.Group();
        const barrel = new THREE.Mesh(cannonBarrelGeometry, cannonMaterial);
        barrel.rotation.x = Math.PI / 2;
        barrel.position.set(0, 0.45, 0);

        const tip = new THREE.Mesh(cannonTipGeometry, cannonMaterial);
        tip.position.set(0, 0.95, 0);

        cannon.add(barrel);
        cannon.add(tip);
        cannon.position.set(x, y, z);
        ship.add(cannon);
      }

      const cannonZ = 1.4;
      const cannonYOffset = 0.45;
      const cannonXOffset = 3.1;

      addCannon(cannonXOffset, cannonYOffset, cannonZ);
      addCannon(cannonXOffset, -cannonYOffset, cannonZ);
      addCannon(-cannonXOffset, cannonYOffset, cannonZ);
      addCannon(-cannonXOffset, -cannonYOffset, cannonZ);

      ship.position.set(0, 0.2, 0);
      ship.rotation.y = Math.PI; // face toward camera
      scene.add(ship);

      const starGeometry = new THREE.BufferGeometry();
      const starCount = 600;
      const starPositions = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount; i++) {
        const i3 = i * 3;
        starPositions[i3 + 0] = (Math.random() - 0.5) * 80;
        starPositions[i3 + 1] = (Math.random() - 0.5) * 80;
        starPositions[i3 + 2] = -Math.random() * 200;
      }
      starGeometry.setAttribute(
        "position",
        new THREE.BufferAttribute(starPositions, 3)
      );
      const starMaterial = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.06,
      });
      const stars = new THREE.Points(starGeometry, starMaterial);
      scene.add(stars);

      function onResize() {
        const width = window.innerWidth;
        const height = window.innerHeight;
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height);
      }

      window.addEventListener("resize", onResize);

      function animate() {
        requestAnimationFrame(animate);

        ship.rotation.y = Math.PI + Math.sin(Date.now() * 0.0007) * 0.15;
        ship.rotation.z = Math.sin(Date.now() * 0.0012) * 0.03;

        renderer.render(scene, camera);
      }

      animate();
    </script>
  </body>
</html>
